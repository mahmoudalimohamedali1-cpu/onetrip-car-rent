<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>إدارة حجزك — One Trip Car Rent</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="booking.css">
<style>
  .mb-wrap{max-width:560px;margin:0 auto;}
  .mb-status{display:inline-flex;align-items:center;gap:7px;font-weight:900;font-size:13px;padding:6px 14px;border-radius:999px;}
  .mb-status.confirmed{background:#e7f7ee;color:#0f7a47;}
  .mb-status.cancelled{background:#eceef5;color:#6a7290;}
  .mb-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;}
  .mb-head .ref{font-weight:900;font-size:18px;color:var(--blue);}
  .mb-car{display:flex;align-items:center;gap:16px;padding:16px;background:linear-gradient(135deg,#f7f9ff,#fff);border:1px solid var(--line);border-radius:16px;margin-bottom:18px;}
  .mb-car img{width:110px;height:70px;object-fit:contain;flex:0 0 auto;}
  .mb-car b{display:block;font-size:18px;font-weight:900;color:var(--ink);}
  .mb-car span{font-size:13px;font-weight:800;color:var(--orange);}
  .mb-detail{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);font-size:14.5px;}
  .mb-detail:last-of-type{border-bottom:none;}
  .mb-detail .k{color:var(--muted);font-weight:700;white-space:nowrap;}
  .mb-detail .vv{font-weight:800;color:var(--ink);text-align:left;}
  .mb-grand{display:flex;align-items:baseline;justify-content:space-between;padding:14px 16px;margin-top:6px;background:#f4f7ff;border:1px solid var(--line);border-radius:14px;}
  .mb-grand .l{font-weight:800;color:var(--ink);font-size:15px;}
  .mb-grand .t{font-weight:900;color:var(--blue);font-size:24px;}
  .mb-actions{margin-top:20px;}
  .otb-btn-danger{background:#fff;border:1.5px solid #f3c6c0;color:var(--red);box-shadow:none;}
  .otb-btn-danger:hover{background:#fdecea;color:var(--red);border-color:var(--red);}
</style>
</head>
<body>

<main class="otb-wrap">
  <div class="mb-wrap">
    <h1 class="otb-h1">إدارة حجزك</h1>
    <p class="otb-lead">أدخل رقم الحجز ورقم الجوال لعرض تفاصيل حجزك أو إلغائه.</p>

    <!-- search panel -->
    <div class="otb-panel" id="searchPanel">
      <h2 class="line">استعلام عن حجز</h2>
      <div id="searchAlert"></div>
      <div class="otb-f">
        <label for="refInput">رقم الحجز</label>
        <input type="text" id="refInput" placeholder="OT-123456" autocomplete="off">
      </div>
      <div class="otb-f">
        <label for="phoneInput">رقم الجوال</label>
        <input type="tel" id="phoneInput" placeholder="05XXXXXXXX" inputmode="tel" autocomplete="off">
      </div>
      <button class="otb-btn otb-btn-pri" id="searchBtn" type="button">عرض الحجز</button>
    </div>

    <!-- booking details (filled on success) -->
    <div class="otb-panel" id="detailPanel" style="display:none;">
      <div class="mb-head">
        <span class="ref" id="dRef"></span>
        <span class="mb-status" id="dStatus"></span>
      </div>
      <div id="cancelAlert"></div>
      <div class="mb-car">
        <img id="dImg" src="" alt="">
        <div><b id="dName"></b><span id="dCat"></span></div>
      </div>
      <div id="dRows"></div>
      <div class="mb-grand"><span class="l">الإجمالي (شامل الضريبة)</span><span class="t" id="dTotal"></span></div>
      <div class="mb-actions" id="dActions"></div>
    </div>
  </div>
</main>

<script src="cars.js?v=7"></script>
<script src="booking-core.js?v=7"></script>
<script src="offers-core.js"></script>
<script>
(function(){
  'use strict';

  OTB.mountChrome({back:'index.html'});

  var current=null;
  var refInput=document.getElementById('refInput');
  var phoneInput=document.getElementById('phoneInput');
  var searchAlert=document.getElementById('searchAlert');
  var detailPanel=document.getElementById('detailPanel');
  var cancelAlert=document.getElementById('cancelAlert');

  function fmtDate(s){
    if(!s) return '—';
    var d=new Date(s); if(isNaN(d)) return '—';
    var Y=d.getFullYear(), M=d.getMonth()+1, D=d.getDate(), h=d.getHours(), m=d.getMinutes();
    function p(n){return (n<10?'0':'')+n;}
    return OTB.toAr(Y+'/'+p(M)+'/'+p(D)+' · '+p(h)+':'+p(m));
  }
  function detailRow(k,v){
    return '<div class="mb-detail"><span class="k">'+k+'</span><span class="vv">'+v+'</span></div>';
  }

  function renderStatus(b){
    var st=document.getElementById('dStatus');
    if(b.status==='cancelled'){ st.className='mb-status cancelled'; st.textContent='ملغي'; }
    else { st.className='mb-status confirmed'; st.textContent='مؤكّد'; }
  }

  function renderActions(b){
    var box=document.getElementById('dActions');
    if(b.status==='confirmed'){
      box.innerHTML='<button class="otb-btn otb-btn-danger" id="cancelBtn" type="button">إلغاء الحجز</button>';
      document.getElementById('cancelBtn').addEventListener('click',function(){
        if(!window.confirm('هل أنت متأكد من إلغاء الحجز؟ لا يمكن التراجع عن هذا الإجراء.')) return;
        OTB.cancelBooking(b.reference);
        current.status='cancelled';
        renderStatus(current);
        cancelAlert.innerHTML='<div class="otb-alert ok"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>تم إلغاء الحجز.</div>';
        renderActions(current);
      });
    } else {
      box.innerHTML='';
    }
  }

  function renderBooking(b){
    current=b;
    cancelAlert.innerHTML='';
    document.getElementById('dRef').textContent=b.reference;

    var c=OTB.car(b.carId)||{};
    document.getElementById('dImg').src=b.carImage||c.image||'';
    document.getElementById('dName').textContent=b.carName||c.name||'';
    document.getElementById('dCat').textContent=c.category||'';

    var rows='';
    rows+=detailRow('استلام',(b.pickup||'—'));
    rows+=detailRow('تسليم',(b.dropoff||b.pickup||'—'));
    rows+=detailRow('تاريخ الاستلام',fmtDate(b.pickupAt));
    rows+=detailRow('تاريخ التسليم',fmtDate(b.returnAt));
    rows+=detailRow('عدد الأيام',OTB.toAr(b.days||OTB.days(b.pickupAt,b.returnAt))+' يوم');
    document.getElementById('dRows').innerHTML=rows;

    var total=(b.totals&&b.totals.total)||0;
    document.getElementById('dTotal').textContent=OTB.money(total);

    renderStatus(b);
    renderActions(b);
    detailPanel.style.display='';
  }

  function doSearch(){
    searchAlert.innerHTML='';
    var ref=(refInput.value||'').trim();
    var phone=(phoneInput.value||'').trim();
    if(!ref){
      searchAlert.innerHTML='<div class="otb-alert warn">يرجى إدخال رقم الحجز.</div>';
      return;
    }
    var b=OTB.findBooking(ref, phone);
    if(!b){
      detailPanel.style.display='none';
      current=null;
      searchAlert.innerHTML='<div class="otb-alert err"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="13"/><circle cx="12" cy="16.5" r="0.6" fill="currentColor"/></svg>لم نجد حجزًا مطابقًا.</div>';
      return;
    }
    renderBooking(b);
    detailPanel.scrollIntoView({behavior:'smooth',block:'nearest'});
  }

  document.getElementById('searchBtn').addEventListener('click',doSearch);
  [refInput,phoneInput].forEach(function(el){
    el.addEventListener('keydown',function(e){ if(e.key==='Enter') doSearch(); });
  });

  /* auto-fill + search from URL params — used by the booking widget "إدارة الحجز" tab
     (manage-booking.html?ref=OT-123456&phone=05XXXXXXXX) */
  (function(){
    var p=new URLSearchParams(location.search);
    var r=p.get('ref'), ph=p.get('phone');
    if(r) refInput.value=r;
    if(ph) phoneInput.value=ph;
    if(r) doSearch();
  })();
})();
</script>
</body>
</html>
