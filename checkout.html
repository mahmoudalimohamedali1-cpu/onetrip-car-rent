<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>بياناتك — One Trip Car Rent</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="booking.css">
<link rel="stylesheet" href="auth-widget.css">
</head>
<body>

<div class="otb-wrap">
  <h1 class="otb-h1">بيانات المستأجر</h1>
  <p class="otb-lead">أدخل بياناتك لإتمام الحجز — جميع المعلومات محفوظة بشكل آمن.</p>

  <div class="otb-grid">
    <div>
      <!-- بيانات المستأجر -->
      <div class="otb-panel">
        <h2 class="line">بيانات المستأجر</h2>
        <div class="otb-2">
          <div class="otb-f">
            <label for="fName">الاسم الكامل *</label>
            <input id="fName" type="text" placeholder="مثال: محمد عبدالله">
          </div>
          <div class="otb-f">
            <label for="fPhone">رقم الجوال *</label>
            <input id="fPhone" type="tel" dir="ltr" inputmode="tel" placeholder="05xxxxxxxx">
          </div>
          <div class="otb-f">
            <label for="fEmail">البريد الإلكتروني *</label>
            <input id="fEmail" type="email" dir="ltr" placeholder="name@example.com">
          </div>
          <div class="otb-f">
            <label for="fNid">رقم الهوية / الإقامة *</label>
            <input id="fNid" type="text" dir="ltr" inputmode="numeric" maxlength="10" placeholder="١٠ أرقام">
          </div>
          <div class="otb-f">
            <label for="fLicense">رقم رخصة القيادة *</label>
            <input id="fLicense" type="text" dir="ltr" placeholder="رقم الرخصة">
          </div>
          <div class="otb-f">
            <label for="fDob">تاريخ الميلاد</label>
            <input id="fDob" type="date">
          </div>
          <div class="otb-f full">
            <label for="fNotes">ملاحظات</label>
            <textarea id="fNotes" rows="3" placeholder="أي طلبات خاصة (اختياري)"></textarea>
          </div>
        </div>
      </div>

      <!-- كود الخصم -->
      <div class="otb-panel">
        <h2 class="line">كود الخصم</h2>
        <div id="promoAlert"></div>
        <div class="otb-2" style="align-items:end;">
          <div class="otb-f" style="margin-bottom:0;">
            <label for="fPromo">لديك كود خصم؟</label>
            <input id="fPromo" type="text" dir="ltr" placeholder="مثال: ONETRIP10" style="text-transform:uppercase;">
          </div>
          <div class="otb-f" style="margin-bottom:0;">
            <button id="applyBtn" type="button" class="otb-btn otb-btn-ghost sm">تطبيق</button>
          </div>
        </div>
      </div>

      <button id="goPay" type="button" class="otb-btn otb-btn-pri">الانتقال للدفع</button>
    </div>

    <!-- الشريط الجانبي -->
    <aside class="otb-summary">
      <div class="otb-sum-car"><img id="sumImg" src="" alt=""><div><b id="sumName"></b><span id="sumCat"></span></div></div>
      <div class="otb-sum-body" id="sumBody"></div>
      <div class="otb-total"><span class="l">الإجمالي (شامل الضريبة)</span><span class="t" id="sumTotal"></span></div>
      <div class="otb-note" id="sumNote"></div>
    </aside>
  </div>
</div>

<script src="cars.js?v=7"></script>
<script src="booking-core.js?v=7"></script>
<script src="auth-core.js"></script>
<script src="req-core.js"></script>
<script src="auth-widget.js"></script>
<script>
(function(){
  'use strict';

  var d = OTB.draft.get();
  if(!d.carId){ location.replace('create-booking.html'); return; }

  OTB.mountChrome({step:2, back:'extras.html'});

  var appliedCode = d.promo || null;

  function currentQuote(){
    return OTB.quote({
      carId: d.carId,
      days: OTB.days(d.pickupAt, d.returnAt),
      extras: d.extras || [],
      promoCode: appliedCode
    });
  }

  function row(l,v,c){return '<div class="otb-row '+(c||'')+'"><span>'+l+'</span><span class="v">'+v+'</span></div>';}
  function renderSummary(q){
    document.getElementById('sumImg').src=q.car.image||'';
    document.getElementById('sumName').textContent=q.car.name||'';
    document.getElementById('sumCat').textContent=q.car.category||'';
    var r=row('سعر التأجير ('+OTB.toAr(q.days)+' يوم)',OTB.money(q.base));
    q.extraLines.forEach(function(l){ r+=row(l.name+(l.qty>1?' ×'+OTB.toAr(l.qty):''),OTB.money(l.amount)); });
    if(q.discount>0) r+=row('الخصم','− '+OTB.money(q.discount),'disc');
    r+=row('ضريبة القيمة المضافة (١٥٪)',OTB.money(q.vat));
    document.getElementById('sumBody').innerHTML=r;
    document.getElementById('sumTotal').innerHTML=OTB.money(q.total);
    document.getElementById('sumNote').innerHTML='يشمل ضريبة القيمة المضافة ١٥٪ · مبلغ تأمين مسترد '+OTB.money(q.deposit);
  }

  function refresh(){ renderSummary(currentQuote()); }

  /* prefill customer fields from existing draft */
  var c = d.customer || {};
  document.getElementById('fName').value    = c.name || '';
  document.getElementById('fPhone').value   = c.phone || '';
  document.getElementById('fEmail').value   = c.email || '';
  document.getElementById('fNid').value     = c.nationalId || '';
  document.getElementById('fLicense').value = c.license || '';
  document.getElementById('fDob').value     = c.dob || '';
  document.getElementById('fNotes').value   = c.notes || '';
  if(appliedCode) document.getElementById('fPromo').value = appliedCode;

  /* numeric-only guards */
  document.getElementById('fNid').addEventListener('input',function(){
    this.value=this.value.replace(/\D/g,'').slice(0,10);
  });
  document.getElementById('fPhone').addEventListener('input',function(){
    this.value=this.value.replace(/[^\d]/g,'').slice(0,10);
  });

  /* apply promo */
  var promoAlert=document.getElementById('promoAlert');
  document.getElementById('applyBtn').addEventListener('click',function(){
    var code=document.getElementById('fPromo').value.trim().toUpperCase();
    if(!code){
      appliedCode=null;
      promoAlert.innerHTML='<div class="otb-alert warn">أدخل كود الخصم أولًا.</div>';
      refresh();
      return;
    }
    /* validate against the subtotal BEFORE any discount */
    var sub=OTB.quote({carId:d.carId, days:OTB.days(d.pickupAt,d.returnAt), extras:d.extras||[]}).subtotal;
    var res=OTB.validatePromo(code, sub);
    if(res.ok){
      appliedCode=res.code||code;
      OTB.draft.set({promo:appliedCode});
      promoAlert.innerHTML='<div class="otb-alert ok">'+(res.msg||'تم تطبيق الخصم')+' ('+OTB.money(res.discount)+')</div>';
    } else {
      appliedCode=null;
      promoAlert.innerHTML='<div class="otb-alert err">'+(res.msg||'كود الخصم غير صالح')+'</div>';
    }
    refresh();
  });

  /* ============================================================
     متطلبات الحجز (OneTrip.Reqs) + شريط الحساب (OneTrip.Auth)
     إضافي بالكامل — محروس: لو الوحدات غير محمّلة يعمل التدفّق الأصلي كما هو.
     ============================================================ */
  var Auth = (window.OneTrip && window.OneTrip.Auth) || null;
  var Reqs = (window.OneTrip && window.OneTrip.Reqs) || null;
  var AuthWidget = (window.OneTrip && window.OneTrip.AuthWidget) || null;

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(ch){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
  }); }
  function digits(s){ return String(s==null?'':s).replace(/\D/g,''); }

  /* custId: معرّف المسجّل، أو ضيف مبني على أرقام الجوال */
  function custId(){
    try{
      var cur = Auth && Auth.current && Auth.current();
      if(cur && cur.id) return cur.id;
    }catch(e){}
    var ph = digits(document.getElementById('fPhone').value);
    return 'guest_' + ph;
  }

  /* ---- شريط الحساب أعلى عمود النموذج (فوق لوحة «بيانات المستأجر») ---- */
  var firstPanel = document.querySelector('.otb-grid > div > .otb-panel');
  var acctBar = null;
  if(Auth && firstPanel){
    acctBar = document.createElement('div');
    acctBar.className = 'otb-panel';
    acctBar.id = 'acctBar';
    acctBar.style.display = 'flex';
    acctBar.style.alignItems = 'center';
    acctBar.style.justifyContent = 'space-between';
    acctBar.style.gap = '12px';
    acctBar.style.flexWrap = 'wrap';
    firstPanel.parentNode.insertBefore(acctBar, firstPanel);
  }
  function renderAcctBar(){
    if(!acctBar || !Auth) return;
    var cur = null;
    try{ cur = Auth.current && Auth.current(); }catch(e){}
    if(cur && Auth.isLoggedIn && Auth.isLoggedIn()){
      acctBar.innerHTML = '<span style="font-weight:700;">مرحبًا '+esc(cur.name||'')+'</span>'+
        '<button type="button" id="acctLogout" class="otb-btn otb-btn-ghost sm">تسجيل الخروج</button>';
      /* املأ الحقول الفارغة من الحساب */
      var f;
      if((f=document.getElementById('fName')) && !f.value)  f.value = cur.name || '';
      if((f=document.getElementById('fPhone')) && !f.value) f.value = digits(cur.phone||'').slice(0,10);
      if((f=document.getElementById('fEmail')) && !f.value) f.value = cur.email || '';
      var lo = document.getElementById('acctLogout');
      if(lo) lo.addEventListener('click',function(){ try{ Auth.logout(); }catch(e){} });
    } else {
      acctBar.innerHTML = '<span>سجّل الدخول لإكمال متطلبات الحجز.</span>'+
        '<button type="button" id="acctLogin" class="otb-btn otb-btn-pri sm">سجّل الدخول</button>';
      var li = document.getElementById('acctLogin');
      if(li) li.addEventListener('click',function(){
        try{ if(AuthWidget && AuthWidget.open) AuthWidget.open('login'); }catch(e){}
      });
    }
  }

  /* ---- لوحة «متطلبات الحجز» بعد لوحة «بيانات المستأجر» ---- */
  var reqsPanel = null;
  if(Reqs && firstPanel){
    reqsPanel = document.createElement('div');
    reqsPanel.className = 'otb-panel';
    reqsPanel.id = 'reqsPanel';
    firstPanel.parentNode.insertBefore(reqsPanel, firstPanel.nextSibling);
  }
  function statusLabel(st){
    if(st==='approved') return '<span style="color:#16a34a;font-weight:700;">معتمد ✓</span>';
    if(st==='rejected') return '<span style="color:#dc2626;font-weight:700;">مرفوض</span>';
    return '<span style="color:#f5901e;font-weight:700;">قيد المراجعة</span>';
  }
  function renderReqsPanel(){
    if(!reqsPanel || !Reqs) return;
    var cfg, dcs;
    try{ cfg = Reqs.config(); dcs = Reqs.docs(custId()); }
    catch(e){ return; }
    var fields = (cfg && cfg.fields) || [];
    var atts   = (cfg && cfg.attachments) || [];
    var html = '<h2 class="line">متطلبات الحجز</h2>'+
      '<div id="reqsAlert"></div><div class="otb-2">';
    fields.forEach(function(f){
      var v = (dcs.fields && dcs.fields[f.id] != null) ? dcs.fields[f.id] : '';
      html += '<div class="otb-f">'+
        '<label for="rq_'+esc(f.id)+'">'+esc(f.label||f.id)+(f.required?' *':'')+'</label>'+
        '<input id="rq_'+esc(f.id)+'" data-fid="'+esc(f.id)+'" type="'+(f.type==='date'?'date':'text')+'" value="'+esc(v)+'">'+
        '</div>';
    });
    atts.forEach(function(a){
      var rec = (dcs.attachments && dcs.attachments[a.id]) || null;
      var info = '';
      if(rec){
        info = '<div style="font-size:13px;margin-top:4px;">'+
          esc(rec.name||'ملف مرفوع')+' — '+statusLabel(rec.status)+
          (rec.status==='rejected' && rec.note ? ' <em style="color:#dc2626;">('+esc(rec.note)+')</em>' : '')+'</div>';
      }
      html += '<div class="otb-f">'+
        '<label for="rq_'+esc(a.id)+'">'+esc(a.label||a.id)+(a.required?' *':'')+'</label>'+
        '<input id="rq_'+esc(a.id)+'" data-aid="'+esc(a.id)+'" type="file" accept="image/*,application/pdf">'+
        info+'</div>';
    });
    html += '</div>';
    reqsPanel.innerHTML = html;

    /* حفظ الحقول عند التغيير */
    fields.forEach(function(f){
      var el = document.getElementById('rq_'+f.id);
      if(el) el.addEventListener('change',function(){
        try{ Reqs.saveField(custId(), f.id, this.value); }catch(e){}
      });
    });
    /* قراءة المرفقات FileReader→dataURL وحفظها */
    atts.forEach(function(a){
      var el = document.getElementById('rq_'+a.id);
      if(!el) return;
      el.addEventListener('change',function(){
        var file = this.files && this.files[0];
        var alertBox = document.getElementById('reqsAlert');
        if(!file) return;
        if(file.size > 1.5*1024*1024){
          if(alertBox) alertBox.innerHTML='<div class="otb-alert err">حجم الملف كبير جدًا — الحد الأقصى ١٫٥ ميجابايت.</div>';
          this.value='';
          return;
        }
        var fr = new FileReader();
        fr.onload = function(){
          try{
            var res = Reqs.saveAttachment(custId(), a.id, {name:file.name, dataURL:fr.result});
            if(res && res.ok===false && alertBox){
              alertBox.innerHTML='<div class="otb-alert err">'+esc(res.error||'تعذّر حفظ الملف.')+'</div>';
            } else {
              renderReqsPanel();
            }
          }catch(e){}
        };
        fr.onerror = function(){
          if(alertBox) alertBox.innerHTML='<div class="otb-alert err">تعذّرت قراءة الملف.</div>';
        };
        fr.readAsDataURL(file);
      });
    });
  }

  renderAcctBar();
  renderReqsPanel();

  /* إعادة الرسم عند الدخول/الخروج أو تغيّر المتطلبات */
  try{ if(Auth && Auth.on) Auth.on('change',function(){ renderAcctBar(); renderReqsPanel(); }); }catch(e){}
  try{ if(Reqs && Reqs.on) Reqs.on('change',function(){ renderReqsPanel(); }); }catch(e){}

  /* proceed to payment */
  document.getElementById('goPay').addEventListener('click',function(){
    var name    = document.getElementById('fName').value.trim();
    var phone   = document.getElementById('fPhone').value.trim();
    var email   = document.getElementById('fEmail').value.trim();
    var nid     = document.getElementById('fNid').value.trim();
    var license = document.getElementById('fLicense').value.trim();
    var dob     = document.getElementById('fDob').value;
    var notes   = document.getElementById('fNotes').value.trim();

    var miss=[];
    if(!name) miss.push('الاسم الكامل');
    if(!phone) miss.push('رقم الجوال');
    if(!email) miss.push('البريد الإلكتروني');
    if(!nid) miss.push('رقم الهوية / الإقامة');
    if(!license) miss.push('رقم رخصة القيادة');

    if(miss.length){
      promoAlert.scrollIntoView({behavior:'smooth',block:'center'});
      alert('يرجى إكمال الحقول المطلوبة: '+miss.join('، '));
      return;
    }
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){
      promoAlert.scrollIntoView({behavior:'smooth',block:'center'});
      alert('من فضلك أدخل بريدًا إلكترونيًا صحيحًا — سنرسل عليه تأكيد الحجز.');
      return;
    }

    var customer = { name:name, phone:phone, email:email, nationalId:nid, license:license, dob:dob, notes:notes };

    /* ---- بوابة متطلبات الحجز (محروسة) ---- */
    if(Reqs){
      try{
        var cid = custId();
        /* خزّن قيم حقول المتطلبات الحالية قبل الفحص */
        if(reqsPanel){
          var inputs = reqsPanel.querySelectorAll('input[data-fid]');
          for(var i=0;i<inputs.length;i++){
            try{ Reqs.saveField(cid, inputs[i].getAttribute('data-fid'), inputs[i].value); }catch(e){}
          }
        }
        var r = Reqs.check(cid);
        if(r && !r.ok){
          var parts = [];
          (r.missingFields||[]).forEach(function(x){ parts.push(x.label); });
          (r.missingAttachments||[]).forEach(function(x){ parts.push(x.label); });
          (r.rejected||[]).forEach(function(x){ parts.push(x.label + (x.note?' ('+x.note+')':'')); });
          var msg = 'يجب إكمال/إرفاق متطلبات الحجز التالية: ' + parts.join('، ');
          var ab = document.getElementById('reqsAlert');
          if(ab) ab.innerHTML = '<div class="otb-alert err">'+esc(msg)+'</div>';
          (reqsPanel || promoAlert).scrollIntoView({behavior:'smooth',block:'center'});
          alert(msg);
          return;
        }
        /* تمام: ضمّن لقطة المستندات داخل customer */
        try{ customer.docs = Reqs.snapshot(cid); }catch(e){}
      }catch(e){ /* لو فشل أي شيء في طبقة المتطلبات لا نمنع التدفّق الأصلي */ }
    }

    OTB.draft.set({
      customer: customer,
      promo: appliedCode || null
    });
    location.href='payment.html';
  });

  refresh();
})();
</script>
</body>
</html>
